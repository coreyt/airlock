# Airlock - LiteLLM Proxy Configuration
# https://docs.litellm.ai/docs/proxy/configs
#
# This is the main configuration file for the Airlock LLM proxy.
# Copy to config.yaml and fill in your API keys (or set them as env vars).

# ---------------------------------------------------------------------------
# Model definitions
# ---------------------------------------------------------------------------
model_list:
  # --- Anthropic (Claude) ---
  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-20250514
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-haiku
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-opus
    litellm_params:
      model: anthropic/claude-opus-4-20250514
      api_key: os.environ/ANTHROPIC_API_KEY

  # --- OpenAI ---
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  # --- Google (Gemini) ---
  - model_name: gemini-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GOOGLE_AISTUDIO_API_KEY

  - model_name: gemini-flash-lite
    litellm_params:
      model: gemini/gemini-2.5-flash-lite
      api_key: os.environ/GOOGLE_AISTUDIO_API_KEY

  - model_name: gemini-pro
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GOOGLE_AISTUDIO_API_KEY

  # --- Google (Gemini 3) ---
  - model_name: gemini-3-flash
    litellm_params:
      model: gemini/gemini-3-flash-preview
      api_key: os.environ/GOOGLE_AISTUDIO_API_KEY

  - model_name: gemini-3-pro
    litellm_params:
      model: gemini/gemini-3-pro-preview
      api_key: os.environ/GOOGLE_AISTUDIO_API_KEY

  - model_name: gemini-3.1-pro
    litellm_params:
      model: gemini/gemini-3.1-pro-preview
      api_key: os.environ/GOOGLE_AISTUDIO_API_KEY

  - model_name: gemini-3.1-pro-tools
    litellm_params:
      model: gemini/gemini-3.1-pro-preview-customtools
      api_key: os.environ/GOOGLE_AISTUDIO_API_KEY

  # --- Mistral AI ---
  - model_name: mistral-small
    litellm_params:
      model: mistral/mistral-small-latest
      api_key: os.environ/MISTRAL_API_KEY

  - model_name: mistral-large
    litellm_params:
      model: mistral/mistral-large-latest
      api_key: os.environ/MISTRAL_API_KEY

  - model_name: codestral
    litellm_params:
      model: mistral/codestral-latest
      api_key: os.environ/MISTRAL_API_KEY

  - model_name: magistral-medium
    litellm_params:
      model: mistral/magistral-medium-2509
      api_key: os.environ/MISTRAL_API_KEY

  # --- Perplexity (litellm-native) ---
  - model_name: perplexity-sonar
    litellm_params:
      model: perplexity/sonar
      api_key: os.environ/PERPLEXITY_API_KEY

  - model_name: perplexity-sonar-pro
    litellm_params:
      model: perplexity/sonar-pro
      api_key: os.environ/PERPLEXITY_API_KEY

  - model_name: perplexity-sonar-deep-research
    litellm_params:
      model: perplexity/sonar-deep-research
      api_key: os.environ/PERPLEXITY_API_KEY

  # --- Tavily (web search as chat completion) ---
  - model_name: tavily-search
    litellm_params:
      model: tavily/web-search
      api_key: os.environ/TAVILY_API_KEY

  # --- Smart Router (auto-selects model by query complexity) ---
  # Send model: "smart" and Airlock auto-classifies prompt complexity:
  #   simple → low-cost tier (claude-haiku, gemini-flash, gpt-4o-mini)
  #   moderate → balanced tier (claude-sonnet, gemini-pro, gpt-4o)
  #   complex → powerful tier (claude-opus, gemini-3-pro)
  # Native heuristic classifier in router.py — no ML deps, ~50μs latency.
  # Thresholds configurable via AIRLOCK_SMART_THRESHOLDS env var.
  # Composes with other directives: session_id, prefer_provider, cost_tier.

  # --- Local vLLM / Self-hosted (uncomment and adjust) ---
  # Any OpenAI-compatible endpoint (vLLM, Ollama, LocalAI, etc.)
  # The model ID must match what the server reports via GET /v1/models.
  # - model_name: local-model
  #   litellm_params:
  #     model: openai/your-model-id
  #     api_base: http://your-host:8000/v1
  #     api_key: os.environ/VLLM_API_KEY

  # --- Internal RAG (Phase 3 — uncomment when ready) ---
  # - model_name: internal-docs
  #   litellm_params:
  #     model: openai/internal-docs
  #     api_base: http://rag-service.internal:8000/v1
  #     api_key: os.environ/INTERNAL_RAG_KEY

# ---------------------------------------------------------------------------
# Proxy settings
# ---------------------------------------------------------------------------
litellm_settings:
  # Drop any unsupported params instead of erroring
  drop_params: true

  # When a request arrives with no user message (e.g. messages=[]),
  # inject a dummy {"role": "user", "content": "Please continue."} so
  # Anthropic and other strict providers don't reject it outright.
  modify_params: true

  # Custom LLM providers — Tavily search exposed as a chat completion model.
  custom_provider_map:
    - provider: tavily
      custom_handler: airlock.providers.tavily_provider.tavily_handler

  # Callbacks — enterprise logging + fast subsystem metrics
  # NOTE: these must point at module-level *instances*, not classes.
  # LiteLLM's get_instance_fn does getattr — classes fail isinstance(cb, CustomLogger).
  callbacks: ["airlock.callbacks.model_override_headers.proxy_model_override_headers"]
  success_callback: ["airlock.callbacks.enterprise_logger.proxy_logger", "airlock.fast.monitor.proxy_monitor"]
  failure_callback: ["airlock.callbacks.enterprise_logger.proxy_logger", "airlock.fast.monitor.proxy_monitor"]

  # Budget & rate-limiting (per-user, requires virtual keys)
  # max_budget: 100.0          # USD per 30-day rolling window
  # budget_duration: 30d

  # Request timeout (seconds)
  request_timeout: 300

# ---------------------------------------------------------------------------
# Router settings
# ---------------------------------------------------------------------------
router_settings:
  routing_strategy: cost-based-routing
  provider_budget_config:
    anthropic:
      budget_limit: 50.0
      time_period: "1d"
    openai:
      budget_limit: 50.0
      time_period: "1d"
    gemini:
      budget_limit: 25.0
      time_period: "1d"
    mistral:
      budget_limit: 25.0
      time_period: "1d"
    perplexity:
      budget_limit: 25.0
      time_period: "1d"
  fallbacks:
    - claude-sonnet: [claude-haiku, gpt-4o, gemini-pro]
    - claude-haiku: [gemini-flash, gpt-4o-mini, mistral-small]
    - claude-opus: [claude-sonnet, gemini-3.1-pro, gpt-4o]
    - gpt-4o: [claude-sonnet, gemini-pro, mistral-large]
    - gpt-4o-mini: [claude-haiku, gemini-flash, mistral-small]
    - gemini-flash: [claude-haiku, gpt-4o-mini, mistral-small]
    - gemini-pro: [claude-sonnet, gpt-4o, mistral-large]
    - gemini-3-pro: [gemini-3.1-pro, claude-opus, gpt-4o]
    - gemini-3.1-pro: [gemini-3-pro, claude-opus, gpt-4o]
    - mistral-small: [claude-haiku, gemini-flash, gpt-4o-mini]
    - mistral-large: [claude-sonnet, gpt-4o, gemini-pro]
    - codestral: [claude-sonnet, gpt-4o, gemini-pro]
    - magistral-medium: [claude-opus, gemini-3.1-pro, gpt-4o]
    - perplexity-sonar: [perplexity-sonar-pro]
    - perplexity-sonar-pro: [perplexity-sonar]

# ---------------------------------------------------------------------------
# Guardrails
# ---------------------------------------------------------------------------
guardrails:
  - guardrail_name: airlock-pii-guard
    litellm_params:
      guardrail: airlock.guardrails.pii_guard.AirlockPIIGuard
      mode: [pre_call, pre_mcp_call]              # redaction — must run first
      default_on: true

  - guardrail_name: airlock-keyword-guard
    litellm_params:
      guardrail: airlock.guardrails.keyword_guard.AirlockKeywordGuard
      mode: [pre_call, pre_mcp_call]
      default_on: true

  - guardrail_name: airlock-fast-guardian
    litellm_params:
      guardrail: airlock.fast.guardian.AirlockFastGuardian
      mode: [pre_call, pre_mcp_call]
      default_on: true

  - guardrail_name: airlock-enforcer
    litellm_params:
      guardrail: airlock.guardrails.enforcer.AirlockEnforcer
      mode: [pre_call, pre_mcp_call]
      default_on: true

  - guardrail_name: airlock-semantic-guard
    litellm_params:
      guardrail: airlock.guardrails.semantic.AirlockSemanticGuard
      mode: [during_call, during_mcp_call]
      default_on: true

  - guardrail_name: airlock-orchestrator
    litellm_params:
      guardrail: airlock.guardrails.orchestrator.AirlockOrchestrator
      mode: [during_call, during_mcp_call]
      default_on: true

  - guardrail_name: airlock-mcp-tool-guard
    litellm_params:
      guardrail: airlock.guardrails.mcp_tool_guard.AirlockMCPToolGuard
      mode: pre_mcp_call          # MCP-only: tool allowlist/blocklist + arg sanitization
      default_on: true

  - guardrail_name: airlock-response-scanner
    litellm_params:
      guardrail: airlock.guardrails.response_scanner.AirlockResponseScanner
      mode: post_call
      default_on: true

  - guardrail_name: airlock-pii-hydrator
    litellm_params:
      guardrail: airlock.guardrails.pii_guard.AirlockPIIGuard
      mode: post_call                              # hydration — must run after response scanner
      default_on: true

# ---------------------------------------------------------------------------
# MCP Servers
# ---------------------------------------------------------------------------
mcp_servers:
  # # --- Remote (SSE transport) — health-check only ---
  # filesystem:
  #   url: http://localhost:3001/sse
  #
  # # --- Remote (HTTP transport) — health-check only ---
  # database:
  #   url: http://localhost:3002/mcp
  #
  # # --- Local (Airlock-managed) — TUI can start/stop ---
  # ado:
  #   url: http://localhost:3003/sse
  #   airlock_managed:
  #     command: node
  #     args: ["dist/index.js"]
  #     cwd: ~/projects/ado-mcp
  #     env:
  #       ADO_TOKEN: os.environ/ADO_TOKEN
  #     health_url: http://localhost:3003/health
  #
  # # --- stdio transport — MUST set transport: stdio ---
  # # LiteLLM defaults to http transport; without explicit stdio
  # # the tool listing will fail (connects to empty URL).
  # search:
  #   transport: stdio
  #   command: npx
  #   args: ["-y", "@anthropic/mcp-search"]
  #   env:
  #     SEARCH_API_KEY: os.environ/SEARCH_API_KEY

  # --- NewsCatcher CatchAll (stdio) ---
  newscatcher:
    transport: stdio
    command: python3
    args: ["-m", "airlock.mcp_servers.newscatcher_server"]
    env:
      NEWS_CATCHER_API_KEY: os.environ/NEWS_CATCHER_API_KEY

# ---------------------------------------------------------------------------
# General proxy behaviour
# ---------------------------------------------------------------------------
general_settings:
  # Master key protects the /key/generate endpoint (set via env)
  master_key: os.environ/AIRLOCK_MASTER_KEY

  # Where the proxy listens
  # host: 0.0.0.0    # set via CLI flag or env
  # port: 4000       # set via CLI flag or env
