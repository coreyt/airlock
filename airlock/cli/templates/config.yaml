# Airlock - LiteLLM Proxy Configuration
# https://docs.litellm.ai/docs/proxy/configs
#
# This is the main configuration file for the Airlock LLM proxy.
# Copy to config.yaml and fill in your API keys (or set them as env vars).

# ---------------------------------------------------------------------------
# Model definitions
# ---------------------------------------------------------------------------
model_list:
  # Aliases below are stable names that point at the current latest model.
  # Bump the underlying `model:` field when a provider ships a new version —
  # clients keep using the alias unchanged.

  # --- Anthropic (Claude Opus 4.8 / Sonnet 4.6 / Haiku 4.5) ---
  - model_name: claude-opus
    litellm_params:
      model: anthropic/claude-opus-4-8
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-haiku
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY

  # --- OpenAI (GPT-5.5 flagship / 5.4 value / 5.4 mini+nano / 5.3 codex) ---
  # Kept in step with the repo's root config.yaml. `-pro` denotes the
  # deep-reasoning/`responses` tier, not a version coordinate — it may lag the
  # flagship's version number when OpenAI has not shipped a pro for that line.
  - model_name: gpt-5-pro
    litellm_params:
      model: openai/gpt-5.5-pro
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-5
    litellm_params:
      model: openai/gpt-5.5
      api_key: os.environ/OPENAI_API_KEY

  # Version-pinned alias: `gpt-5.4` means exactly gpt-5.4. Root's fallback
  # chains reference it, so the template must define it too.
  - model_name: gpt-5.4
    litellm_params:
      model: openai/gpt-5.4
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-5-mini
    litellm_params:
      model: openai/gpt-5.4-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-5-nano
    litellm_params:
      model: openai/gpt-5.4-nano
      api_key: os.environ/OPENAI_API_KEY

  # gpt-5.3-codex is the sole surviving codex model: OpenAI retires
  # gpt-5-codex, gpt-5.1-codex{,-max,-mini}, and gpt-5.2-codex for API
  # requests on 2026-07-23. Do not point this alias at a retired id.
  - model_name: gpt-5-codex
    litellm_params:
      model: openai/gpt-5.3-codex
      api_key: os.environ/OPENAI_API_KEY

  # --- OpenAI GPT-5.6 (GA 2026-07-09) — Sol / Terra / Luna ---
  # A flat PRICE-TIER triple over one capability envelope, not a mini/nano
  # capability ladder: all three share 1,050,000 ctx / 128,000 max output and
  # an identical capability set. Luna is NOT a nano replacement ($1/$6 vs
  # gpt-5.4-nano's $0.20/$1.25). >272K input tokens bills 2x in / 1.5x out.
  # ORDER MATTERS: -sol precedes bare gpt-5.6 so dated snapshots resolve to
  # the explicit variant.
  - model_name: gpt-5.6-sol
    litellm_params:
      model: openai/gpt-5.6-sol
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-5.6-terra
    litellm_params:
      model: openai/gpt-5.6-terra
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-5.6-luna
    litellm_params:
      model: openai/gpt-5.6-luna
      api_key: os.environ/OPENAI_API_KEY

  # Convenience alias. Bare `gpt-5.6` is NOT a real OpenAI model id (verified
  # against live /v1/models) — pinned to the explicit sol body so that string
  # is never forwarded upstream.
  - model_name: gpt-5.6
    litellm_params:
      model: openai/gpt-5.6-sol
      api_key: os.environ/OPENAI_API_KEY

  # Provider-prefixed twins — load-bearing, not cosmetic: the alias table's
  # provider/body index is first-writer-wins, so without these an explicit
  # `openai/gpt-5.6-sol` request can bind to a different alias.
  - model_name: openai/gpt-5.6-sol
    litellm_params:
      model: openai/gpt-5.6-sol
      api_key: os.environ/OPENAI_API_KEY

  - model_name: openai/gpt-5.6-terra
    litellm_params:
      model: openai/gpt-5.6-terra
      api_key: os.environ/OPENAI_API_KEY

  - model_name: openai/gpt-5.6-luna
    litellm_params:
      model: openai/gpt-5.6-luna
      api_key: os.environ/OPENAI_API_KEY

  - model_name: openai/gpt-5.6
    litellm_params:
      model: openai/gpt-5.6-sol
      api_key: os.environ/OPENAI_API_KEY

  # --- Google (Gemini 2.5 stable line) ---
  # Matches root config.yaml. The generic aliases deliberately track the
  # STABLE 2.5 line; Gemini 3.x ids are preview-only upstream (there is no
  # `gemini-3.1-pro`, only `gemini-3.1-pro-preview`).
  - model_name: gemini-pro
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GOOGLE_AISTUDIO_API_KEY

  - model_name: gemini-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GOOGLE_AISTUDIO_API_KEY

  # Advanced to the 3.1 line (2026-07-20) — 3.1-flash-lite is GA, not preview,
  # unlike gemini-3.1-pro/gemini-3-flash which exist only as -preview.
  - model_name: gemini-flash-lite
    litellm_params:
      model: gemini/gemini-3.1-flash-lite
      api_key: os.environ/GOOGLE_AISTUDIO_API_KEY

  # --- Mistral AI (large-3 / small-4 / magistral / codestral) ---
  - model_name: mistral-large
    litellm_params:
      model: mistral/mistral-large-latest
      api_key: os.environ/MISTRAL_API_KEY

  - model_name: mistral-medium
    litellm_params:
      model: mistral/mistral-medium-latest
      api_key: os.environ/MISTRAL_API_KEY

  - model_name: mistral-small
    litellm_params:
      model: mistral/mistral-small-latest
      api_key: os.environ/MISTRAL_API_KEY

  - model_name: codestral
    litellm_params:
      model: mistral/codestral-latest
      api_key: os.environ/MISTRAL_API_KEY

  - model_name: magistral-medium
    litellm_params:
      model: mistral/magistral-medium-latest
      api_key: os.environ/MISTRAL_API_KEY

  # --- Perplexity Sonar ---
  - model_name: perplexity-sonar
    litellm_params:
      model: perplexity/sonar
      api_key: os.environ/PERPLEXITY_API_KEY

  - model_name: perplexity-sonar-pro
    litellm_params:
      model: perplexity/sonar-pro
      api_key: os.environ/PERPLEXITY_API_KEY

  - model_name: perplexity-sonar-reasoning-pro
    litellm_params:
      model: perplexity/sonar-reasoning-pro
      api_key: os.environ/PERPLEXITY_API_KEY

  - model_name: perplexity-sonar-deep-research
    litellm_params:
      model: perplexity/sonar-deep-research
      api_key: os.environ/PERPLEXITY_API_KEY

  # --- Tavily (web search as chat completion) ---
  - model_name: tavily-search
    litellm_params:
      model: tavily/web-search
      api_key: os.environ/TAVILY_API_KEY

  # --- Smart Router (auto-selects model by query complexity) ---
  # Send model: "smart" and Airlock auto-classifies prompt complexity:
  #   simple   → low   tier (claude-haiku, gemini-flash, gpt-5-nano, mistral-small)
  #   moderate → medium tier (claude-sonnet, gemini-pro, gpt-5-mini, mistral-medium)
  #   complex  → high  tier (claude-opus, gpt-5, gpt-5-pro, magistral-medium)
  # Native heuristic classifier in router.py — no ML deps, ~50μs latency.
  # Thresholds configurable via AIRLOCK_SMART_THRESHOLDS env var.
  # Tier membership is overridable via `cost_tiers:` below or AIRLOCK_COST_TIERS env.
  # Composes with other directives: session_id, prefer_provider, cost_tier.

  # --- Local vLLM / Self-hosted (uncomment and adjust) ---
  # Any OpenAI-compatible endpoint (vLLM, Ollama, LocalAI, etc.)
  # The model ID must match what the server reports via GET /v1/models.
  # - model_name: local-model
  #   litellm_params:
  #     model: openai/your-model-id
  #     api_base: http://your-host:8000/v1
  #     api_key: os.environ/VLLM_API_KEY

  # --- Internal RAG (Phase 3 — uncomment when ready) ---
  # - model_name: internal-docs
  #   litellm_params:
  #     model: openai/internal-docs
  #     api_base: http://rag-service.internal:8000/v1
  #     api_key: os.environ/INTERNAL_RAG_KEY

# ---------------------------------------------------------------------------
# Proxy settings
# ---------------------------------------------------------------------------
litellm_settings:
  # Drop any unsupported params instead of erroring
  drop_params: true

  # When a request arrives with no user message (e.g. messages=[]),
  # inject a dummy {"role": "user", "content": "Please continue."} so
  # Anthropic and other strict providers don't reject it outright.
  modify_params: true

  # Custom LLM providers — Tavily search exposed as a chat completion model.
  custom_provider_map:
    - provider: tavily
      custom_handler: airlock.providers.tavily_provider.tavily_handler

  # Callbacks — enterprise logging + fast subsystem metrics
  # NOTE: these must point at module-level *instances*, not classes.
  # LiteLLM's get_instance_fn does getattr — classes fail isinstance(cb, CustomLogger).
  callbacks: ["airlock.callbacks.model_override_headers.proxy_model_override_headers"]
  success_callback: ["airlock.callbacks.enterprise_logger.proxy_logger", "airlock.fast.monitor.proxy_monitor"]
  failure_callback: ["airlock.callbacks.enterprise_logger.proxy_logger", "airlock.fast.monitor.proxy_monitor"]

  # Budget & rate-limiting (per-user, requires virtual keys)
  # max_budget: 100.0          # USD per 30-day rolling window
  # budget_duration: 30d

  # Request timeout (seconds)
  request_timeout: 300

# ---------------------------------------------------------------------------
# Router settings
# ---------------------------------------------------------------------------
router_settings:
  routing_strategy: cost-based-routing
  # provider_budget_config — ONE number drives THREE behaviors per provider:
  #   1. LiteLLM hard block      — request refused once spend hits budget_limit.
  #   2. Monitor near-limit warn — emits `X-Airlock-Budget-State: near_limit` as spend
  #                                approaches the cap (default warn at 80%).
  #   3. Fast-router reroute     — proactively routes away from a provider as its spend
  #                                approaches the cap (default at 90%).
  # `budget_limit: 0` means NO enforcement / unlimited / no warn / no reroute (the falsy
  # short-circuit is identical across all three layers). `time_period: "1d"` is the
  # rolling enforcement window. Override the whole map with the AIRLOCK_PROVIDER_BUDGETS
  # env var (JSON, e.g. {"anthropic": 50}). With no provider_budget_config and no env
  # override there is NO hidden default budget — nothing is blocked, warned, or rerouted.
  provider_budget_config:
    anthropic:
      budget_limit: 50.0
      time_period: "1d"
    openai:
      budget_limit: 50.0
      time_period: "1d"
    gemini:
      budget_limit: 25.0
      time_period: "1d"
    mistral:
      budget_limit: 25.0
      time_period: "1d"
    perplexity:
      budget_limit: 25.0
      time_period: "1d"
  fallbacks:
    - claude-opus: [claude-sonnet, gpt-5-pro, gemini-pro]
    - claude-sonnet: [claude-haiku, gpt-5-mini, gemini-pro]
    - claude-haiku: [gemini-flash, gpt-5-nano, mistral-small]
    - gpt-5-pro: [gpt-5, claude-opus, gemini-pro]
    - gpt-5: [gpt-5-mini, claude-sonnet, gemini-pro]
    - gpt-5-mini: [gpt-5-nano, claude-haiku, gemini-flash]
    - gpt-5-nano: [claude-haiku, gemini-flash, mistral-small]
    - gemini-pro: [claude-sonnet, gpt-5, mistral-large]
    - gemini-flash: [claude-haiku, gpt-5-nano, mistral-small]
    - gemini-flash-lite: [gemini-flash, claude-haiku, gpt-5-nano]
    - mistral-large: [claude-sonnet, gpt-5, gemini-pro]
    - mistral-medium: [mistral-large, claude-sonnet, gpt-5-mini]
    - mistral-small: [claude-haiku, gemini-flash, gpt-5-nano]
    - codestral: [gpt-5-codex, claude-sonnet, gpt-5]
    - magistral-medium: [claude-opus, gpt-5-pro, gemini-pro]
    - perplexity-sonar: [perplexity-sonar-pro]
    - perplexity-sonar-pro: [perplexity-sonar-reasoning-pro, perplexity-sonar]
    - perplexity-sonar-reasoning-pro: [perplexity-sonar-pro]

# ---------------------------------------------------------------------------
# Cost tiers — Airlock routing directive targets
# ---------------------------------------------------------------------------
# Used by cost_tier / smart routing directives. Each tier is an ordered list
# of `model_name` aliases from `model_list` above; the first entry is the
# default swap target for that tier. Override per-deployment without touching
# code. Env var AIRLOCK_COST_TIERS (JSON) takes precedence if set.
cost_tiers:
  low:
    - claude-haiku
    - gemini-flash
    - gemini-flash-lite
    - gpt-5-nano
    - mistral-small
  medium:
    - claude-sonnet
    - gemini-pro
    - gpt-5-mini
    - mistral-medium
    - codestral
  high:
    - claude-opus
    - gpt-5
    - gpt-5-pro
    - mistral-large
    - magistral-medium

# ---------------------------------------------------------------------------
# Guardrails
# ---------------------------------------------------------------------------
guardrails:
  - guardrail_name: airlock-pii-guard
    litellm_params:
      guardrail: airlock.guardrails.pii_guard.AirlockPIIGuard
      mode: [pre_call, pre_mcp_call]              # redaction — must run first
      default_on: true

  - guardrail_name: airlock-keyword-guard
    litellm_params:
      guardrail: airlock.guardrails.keyword_guard.AirlockKeywordGuard
      mode: [pre_call, pre_mcp_call]
      default_on: true

  - guardrail_name: airlock-fast-guardian
    litellm_params:
      guardrail: airlock.fast.guardian.AirlockFastGuardian
      mode: [pre_call, pre_mcp_call]
      default_on: true

  - guardrail_name: airlock-enforcer
    litellm_params:
      guardrail: airlock.guardrails.enforcer.AirlockEnforcer
      mode: [pre_call, pre_mcp_call]
      default_on: true

  - guardrail_name: airlock-semantic-guard
    litellm_params:
      guardrail: airlock.guardrails.semantic.AirlockSemanticGuard
      mode: [during_call, during_mcp_call]
      default_on: true

  - guardrail_name: airlock-orchestrator
    litellm_params:
      guardrail: airlock.guardrails.orchestrator.AirlockOrchestrator
      mode: [during_call, during_mcp_call]
      default_on: true

  - guardrail_name: airlock-mcp-tool-guard
    litellm_params:
      guardrail: airlock.guardrails.mcp_tool_guard.AirlockMCPToolGuard
      mode: pre_mcp_call          # MCP-only: tool allowlist/blocklist + arg sanitization
      default_on: true

  - guardrail_name: airlock-response-scanner
    litellm_params:
      guardrail: airlock.guardrails.response_scanner.AirlockResponseScanner
      mode: post_call
      default_on: true

  - guardrail_name: airlock-pii-hydrator
    litellm_params:
      guardrail: airlock.guardrails.pii_guard.AirlockPIIGuard
      mode: post_call                              # hydration — must run after response scanner
      default_on: true

# ---------------------------------------------------------------------------
# MCP Servers
# ---------------------------------------------------------------------------
mcp_servers:
  # # --- Remote (SSE transport) — health-check only ---
  # filesystem:
  #   url: http://localhost:3001/sse
  #
  # # --- Remote (HTTP transport) — health-check only ---
  # database:
  #   url: http://localhost:3002/mcp
  #
  # # --- Local (Airlock-managed) — TUI can start/stop ---
  # ado:
  #   url: http://localhost:3003/sse
  #   airlock_managed:
  #     command: node
  #     args: ["dist/index.js"]
  #     cwd: ~/projects/ado-mcp
  #     env:
  #       ADO_TOKEN: os.environ/ADO_TOKEN
  #     health_url: http://localhost:3003/health
  #
  # # --- stdio transport — MUST set transport: stdio ---
  # # LiteLLM defaults to http transport; without explicit stdio
  # # the tool listing will fail (connects to empty URL).
  # search:
  #   transport: stdio
  #   command: npx
  #   args: ["-y", "@anthropic/mcp-search"]
  #   env:
  #     SEARCH_API_KEY: os.environ/SEARCH_API_KEY

  # --- NewsCatcher CatchAll (stdio) ---
  newscatcher:
    transport: stdio
    command: python3
    args: ["-m", "airlock.mcp_servers.newscatcher_server"]
    env:
      NEWS_CATCHER_API_KEY: os.environ/NEWS_CATCHER_API_KEY

# ---------------------------------------------------------------------------
# General proxy behaviour
# ---------------------------------------------------------------------------
general_settings:
  # Master key protects the /key/generate endpoint (set via env)
  master_key: os.environ/AIRLOCK_MASTER_KEY

  # Where the proxy listens
  # host: 0.0.0.0    # set via CLI flag or env
  # port: 4000       # set via CLI flag or env
