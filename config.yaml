# Airlock - LiteLLM Proxy Configuration
# https://docs.litellm.ai/docs/proxy/configs
#
# This is the main configuration file for the Airlock LLM proxy.
# Copy to config.yaml and fill in your API keys (or set them as env vars).

# ---------------------------------------------------------------------------
# Model definitions
# ---------------------------------------------------------------------------
model_list:
  # --- Anthropic (Claude Opus 4.8 / Sonnet 4.6 / Haiku 4.5) ---
  - model_name: claude-opus
    litellm_params:
      model: anthropic/claude-opus-4-8
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-haiku
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY

  # --- OpenAI (GPT-5.5 flagship / 5.4 value / 5.4 mini+nano / 5.3 codex) ---
  - model_name: gpt-5-pro
    litellm_params:
      model: openai/gpt-5.5-pro
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-5
    litellm_params:
      model: openai/gpt-5.5
      api_key: os.environ/OPENAI_API_KEY

  # Previous flagship — still available at ~half the cost of 5.5
  # ($2.50/$15 vs $5.00/$30 per 1M). Kept as the cheaper high-tier option.
  - model_name: gpt-5.4
    litellm_params:
      model: openai/gpt-5.4
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-5-mini
    litellm_params:
      model: openai/gpt-5.4-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-5-nano
    litellm_params:
      model: openai/gpt-5.4-nano
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-5-codex
    litellm_params:
      model: openai/gpt-5.3-codex
      api_key: os.environ/OPENAI_API_KEY

  # --- Google (Gemini) ---
  - model_name: gemini-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GOOGLE_AISTUDIO_API_KEY

  - model_name: gemini-flash-lite
    litellm_params:
      model: gemini/gemini-2.5-flash-lite
      api_key: os.environ/GOOGLE_AISTUDIO_API_KEY

  - model_name: gemini-pro
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GOOGLE_AISTUDIO_API_KEY

  # --- Google (Gemini 3.5 / 3.1) ---
  - model_name: gemini-3.5-flash
    litellm_params:
      model: gemini/gemini-3.5-flash
      api_key: os.environ/GOOGLE_AISTUDIO_API_KEY

  - model_name: gemini-3.1-flash-lite
    litellm_params:
      model: gemini/gemini-3.1-flash-lite
      api_key: os.environ/GOOGLE_AISTUDIO_API_KEY

  - model_name: gemini-3-flash
    litellm_params:
      model: gemini/gemini-3-flash-preview
      api_key: os.environ/GOOGLE_AISTUDIO_API_KEY

  # NOTE: gemini-3-pro removed — gemini-3-pro-preview was shut down 2026-03-09.
  # Use gemini-3.1-pro below (Google's recommended migration target).

  - model_name: gemini-3.1-pro
    litellm_params:
      model: gemini/gemini-3.1-pro-preview
      api_key: os.environ/GOOGLE_AISTUDIO_API_KEY

  - model_name: gemini-3.1-pro-tools
    litellm_params:
      model: gemini/gemini-3.1-pro-preview-customtools
      api_key: os.environ/GOOGLE_AISTUDIO_API_KEY

  - model_name: gemini-coding
    litellm_params:
      model: enhanced/gemini-coding
      api_key: os.environ/GOOGLE_AISTUDIO_API_KEY
      enhanced_profile:
        target_model: gemini/gemini-3.1-pro-preview-customtools
        system_prompt: "CRITICAL: You are operating in a multi-turn tool-calling loop. You must retain and finalize all reasoning pathways. Do not truncate internal thoughts."
        params:
          thinking: true
          thinking_level: "MEDIUM"

  # --- Google Vertex AI (Gemini 3.x, BATCH-capable) ---
  # vertex_ai is wired in LiteLLM for the Batch API (/v1/files + /v1/batches);
  # the gemini/ (AI Studio) provider above is not. Also serves sync completions.
  # Auth: VERTEX_PROJECT + VERTEX_CREDENTIALS (service-account JSON) from .env;
  # batch staging uses GCS_BUCKET_NAME. (Needs the `vertex` extra: google-auth.)
  #
  # Availability verified via the SA token (2026-06-14) — both on `global` ONLY
  # (every 3.x id is 404 in us-central1 / us-east5):
  #   gemini-3.5-flash        : 200
  #   gemini-3.1-pro-preview  : 200  (GA id `gemini-3.1-pro` is 404 — use -preview)
  # NOTE: Vertex BATCH jobs generally need a REGIONAL location; `global` is fine
  # for sync but may not support BatchPredictionJob. For 3.x batch, set
  # vertex_location to a region once these models are regionally available.
  - model_name: gemini-3.5-flash-vertex
    litellm_params:
      model: vertex_ai/gemini-3.5-flash
      vertex_project: os.environ/VERTEX_PROJECT
      vertex_location: global
      vertex_credentials: os.environ/VERTEX_CREDENTIALS

  - model_name: gemini-3.1-pro-vertex
    litellm_params:
      model: vertex_ai/gemini-3.1-pro-preview
      vertex_project: os.environ/VERTEX_PROJECT
      vertex_location: global
      vertex_credentials: os.environ/VERTEX_CREDENTIALS

  # --- Mistral AI (large-3 / medium / small-4 / magistral / codestral) ---
  - model_name: mistral-large
    litellm_params:
      model: mistral/mistral-large-latest
      api_key: os.environ/MISTRAL_API_KEY

  - model_name: mistral-medium
    litellm_params:
      model: mistral/mistral-medium-latest
      api_key: os.environ/MISTRAL_API_KEY

  - model_name: mistral-small
    litellm_params:
      model: mistral/mistral-small-latest
      api_key: os.environ/MISTRAL_API_KEY

  - model_name: codestral
    litellm_params:
      model: mistral/codestral-latest
      api_key: os.environ/MISTRAL_API_KEY

  - model_name: magistral-medium
    litellm_params:
      model: mistral/magistral-medium-latest
      api_key: os.environ/MISTRAL_API_KEY

  # --- Perplexity Sonar ---
  - model_name: perplexity-sonar
    litellm_params:
      model: perplexity/sonar
      api_key: os.environ/PERPLEXITY_API_KEY

  - model_name: perplexity-sonar-pro
    litellm_params:
      model: perplexity/sonar-pro
      api_key: os.environ/PERPLEXITY_API_KEY

  - model_name: perplexity-sonar-reasoning-pro
    litellm_params:
      model: perplexity/sonar-reasoning-pro
      api_key: os.environ/PERPLEXITY_API_KEY

  - model_name: perplexity-sonar-deep-research
    litellm_params:
      model: perplexity/sonar-deep-research
      api_key: os.environ/PERPLEXITY_API_KEY

  # --- Tavily (web search as chat completion) ---
  - model_name: tavily-search
    litellm_params:
      model: tavily/web-search
      api_key: os.environ/TAVILY_API_KEY

  # --- Smart Router (auto-selects model by query complexity) ---
  # Send model: "smart" and Airlock auto-classifies prompt complexity:
  #   simple   → low    tier (claude-haiku, gemini-flash, gpt-5-nano, mistral-small)
  #   moderate → medium tier (claude-sonnet, gemini-pro, gpt-5-mini, mistral-medium)
  #   complex  → high   tier (claude-opus, gpt-5, gpt-5-pro, magistral-medium)
  # Native heuristic classifier in router.py — no ML deps, ~50μs latency.
  # Thresholds configurable via AIRLOCK_SMART_THRESHOLDS env var.
  # Tier membership is overridable via the `cost_tiers:` block below or
  # AIRLOCK_COST_TIERS env var. Composes with session_id / prefer_provider.

  # --- Local vLLM (Gemma 4 31B AWQ) ---
  - model_name: gemma-4
    litellm_params:
      model: openai/gemma4-31b
      api_base: http://192.168.1.45:8000/v1
      api_key: os.environ/VLLM_API_KEY

  # --- Local vLLM (Kimi-Dev 72B AWQ-4bit) ---
  # Shares the same vLLM host as gemma-4 (only one local model loaded at a time).
  # Reasoning blocks ◁think▷…◁/think▷ are stripped by the
  # airlock-reasoning-stripper guardrail (Kimi's delimiters aren't single
  # tokens, so vLLM's native --reasoning-parser cannot handle them).
  - model_name: kimi-dev
    litellm_params:
      model: openai/kimi-dev-72b
      api_base: http://192.168.1.45:8000/v1
      api_key: os.environ/VLLM_API_KEY

  # --- Local vLLM (Qwen3 32B AWQ) ---
  # Official Qwen AWQ-4bit (~19 GB). Dense model, comfortable 32k context.
  - model_name: qwen3-32b
    litellm_params:
      model: openai/qwen3-32b
      api_base: http://192.168.1.45:8000/v1
      api_key: os.environ/VLLM_API_KEY

  # --- Local vLLM (Qwen3.6 27B AWQ-INT4, cyankiwi) ---
  # Larger-than-typical AWQ (~41 GB; mixed-precision compressed-tensors).
  # Conservative context until tuned (see start-qwen36-27b.sh).
  - model_name: qwen3.6-27b
    litellm_params:
      model: openai/qwen3.6-27b
      api_base: http://192.168.1.45:8000/v1
      api_key: os.environ/VLLM_API_KEY

  # --- Internal RAG (Phase 3 — uncomment when ready) ---
  # - model_name: internal-docs
  #   litellm_params:
  #     model: openai/internal-docs
  #     api_base: http://rag-service.internal:8000/v1
  #     api_key: os.environ/INTERNAL_RAG_KEY

# ---------------------------------------------------------------------------
# Proxy settings
# ---------------------------------------------------------------------------
litellm_settings:
  # Drop any unsupported params instead of erroring
  drop_params: true

  # Inject a dummy user message when messages=[] so Anthropic doesn't reject the request
  modify_params: true

  # Custom LLM providers — Tavily search exposed as a chat completion model.
  # get_instance_fn resolves the dotted path to a module-level instance.
  custom_provider_map:
    - provider: tavily
      custom_handler: airlock.providers.tavily_provider.tavily_handler
    - provider: enhanced
      custom_handler: airlock.providers.enhanced_passthrough.enhanced_handler

  # Callbacks — enterprise logging + fast subsystem metrics
  # NOTE: these must point at module-level *instances*, not classes.
  # LiteLLM's get_instance_fn does getattr — classes fail isinstance(cb, CustomLogger).
  callbacks: ["airlock.callbacks.model_override_headers.proxy_model_override_headers"]
  success_callback: ["airlock.callbacks.enterprise_logger.proxy_logger", "airlock.fast.monitor.proxy_monitor"] # , "airlock.callbacks.fathom_logger.proxy_fathom_logger"]
  failure_callback: ["airlock.callbacks.enterprise_logger.proxy_logger", "airlock.fast.monitor.proxy_monitor"] # , "airlock.callbacks.fathom_logger.proxy_fathom_logger"]

  # Budget & rate-limiting (per-user, requires virtual keys)
  # max_budget: 100.0          # USD per 30-day rolling window
  # budget_duration: 30d

  # Request timeout (seconds)
  request_timeout: 300

# ---------------------------------------------------------------------------
# Router settings
# ---------------------------------------------------------------------------
router_settings:
  routing_strategy: cost-based-routing
  provider_budget_config:
    anthropic:
      budget_limit: 50.0
      time_period: "1d"
    openai:
      budget_limit: 50.0
      time_period: "1d"
    gemini:
      budget_limit: 25.0
      time_period: "1d"
    mistral:
      budget_limit: 25.0
      time_period: "1d"
    perplexity:
      budget_limit: 25.0
      time_period: "1d"
  fallbacks:
    - claude-opus: [claude-sonnet, gpt-5-pro, gemini-3.1-pro]
    - claude-sonnet: [claude-haiku, gpt-5-mini, gemini-pro]
    - claude-haiku: [gemini-flash, gpt-5-nano, mistral-small]
    - gpt-5-pro: [gpt-5, claude-opus, gemini-3.1-pro]
    - gpt-5: [gpt-5.4, gpt-5-mini, claude-sonnet]
    - gpt-5.4: [gpt-5, gpt-5-mini, claude-sonnet]
    - gpt-5-mini: [gpt-5-nano, claude-haiku, gemini-flash]
    - gpt-5-nano: [claude-haiku, gemini-flash, mistral-small]
    - gpt-5-codex: [codestral, gpt-5, claude-sonnet]
    - gemini-flash: [claude-haiku, gpt-5-nano, mistral-small]
    - gemini-flash-lite: [gemini-flash, claude-haiku, gpt-5-nano]
    - gemini-pro: [claude-sonnet, gpt-5-mini, mistral-large]
    - gemini-3.5-flash: [gemini-3-flash, gemini-flash, claude-haiku]
    - gemini-3.1-flash-lite: [gemini-flash-lite, gemini-flash, gpt-5-nano]
    - gemini-3-flash: [gemini-flash, claude-haiku, gpt-5-nano]
    - gemini-3.1-pro: [gemini-3-flash, claude-opus, gpt-5-pro]
    - gemini-3.1-pro-tools: [gemini-3.1-pro, gemini-3-flash, claude-opus]
    - gemini-coding: [gemini-3.1-pro-tools, claude-opus, gpt-5-codex]
    - mistral-large: [claude-sonnet, gpt-5, gemini-pro]
    - mistral-medium: [mistral-large, claude-sonnet, gpt-5-mini]
    - mistral-small: [claude-haiku, gemini-flash, gpt-5-nano]
    - codestral: [gpt-5-codex, claude-sonnet, gpt-5]
    - magistral-medium: [claude-opus, gpt-5-pro, gemini-3.1-pro]
    - perplexity-sonar: [perplexity-sonar-pro]
    - perplexity-sonar-pro: [perplexity-sonar-reasoning-pro, perplexity-sonar]
    - perplexity-sonar-reasoning-pro: [perplexity-sonar-pro]
    - gemma-4: [claude-haiku, gemini-flash, mistral-small]

# ---------------------------------------------------------------------------
# Cost tiers — Airlock routing directive targets
# ---------------------------------------------------------------------------
# Used by cost_tier / smart routing directives. Each tier is an ordered list
# of `model_name` aliases from `model_list` above; the first entry is the
# default swap target for that tier. Env var AIRLOCK_COST_TIERS (JSON) takes
# precedence if set.
cost_tiers:
  low:
    - claude-haiku
    - gemini-flash
    - gemini-flash-lite
    - gpt-5-nano
    - mistral-small
    - gemma-4
  medium:
    - claude-sonnet
    - gemini-pro
    - gpt-5-mini
    - mistral-medium
    - codestral
  high:
    - claude-opus
    - gpt-5
    - gpt-5.4          # cheaper previous flagship ($2.50/$15) for cost-based routing
    - gpt-5-pro
    - mistral-large
    - magistral-medium
    - gemini-3.1-pro

# ---------------------------------------------------------------------------
# Guardrails
# ---------------------------------------------------------------------------
guardrails:
  - guardrail_name: airlock-pii-guard
    litellm_params:
      guardrail: airlock.guardrails.pii_guard.AirlockPIIGuard
      mode: [pre_call, pre_mcp_call]              # redaction — must run first
      default_on: true

  - guardrail_name: airlock-keyword-guard
    litellm_params:
      guardrail: airlock.guardrails.keyword_guard.AirlockKeywordGuard
      mode: [pre_call, pre_mcp_call]
      default_on: true

  - guardrail_name: airlock-enhanced-interceptor
    litellm_params:
      guardrail: airlock.guardrails.enhanced_interceptor.EnhancedModelInterceptor
      mode: [pre_call, pre_mcp_call]
      default_on: true

  - guardrail_name: airlock-fast-guardian
    litellm_params:
      guardrail: airlock.fast.guardian.AirlockFastGuardian
      mode: [pre_call, pre_mcp_call]
      default_on: true

  - guardrail_name: airlock-enforcer
    litellm_params:
      guardrail: airlock.guardrails.enforcer.AirlockEnforcer
      mode: [pre_call, pre_mcp_call]
      default_on: true

  - guardrail_name: airlock-semantic-guard
    litellm_params:
      guardrail: airlock.guardrails.semantic.AirlockSemanticGuard
      mode: [during_call, during_mcp_call]
      default_on: true

  - guardrail_name: airlock-orchestrator
    litellm_params:
      guardrail: airlock.guardrails.orchestrator.AirlockOrchestrator
      mode: [during_call, during_mcp_call]
      default_on: true

  - guardrail_name: airlock-mcp-tool-guard
    litellm_params:
      guardrail: airlock.guardrails.mcp_tool_guard.AirlockMCPToolGuard
      mode: pre_mcp_call          # MCP-only: tool allowlist/blocklist + arg sanitization
      default_on: true

  - guardrail_name: airlock-response-scanner
    litellm_params:
      guardrail: airlock.guardrails.response_scanner.AirlockResponseScanner
      mode: post_call
      default_on: true

  - guardrail_name: airlock-reasoning-stripper
    litellm_params:
      guardrail: airlock.guardrails.reasoning_stripper.AirlockReasoningStripper
      mode: post_call          # model-scoped via AIRLOCK_REASONING_STRIP_MODELS (default: kimi-dev)
      default_on: true

  - guardrail_name: airlock-local-vllm-router
    litellm_params:
      guardrail: airlock.guardrails.local_vllm_router.AirlockLocalVLLMRouter
      mode: pre_call           # fails fast when requested local alias isn't the loaded vLLM model
      default_on: true

  - guardrail_name: airlock-pii-hydrator
    litellm_params:
      guardrail: airlock.guardrails.pii_guard.AirlockPIIGuard
      mode: post_call                              # hydration — must run after response scanner
      default_on: true

# ---------------------------------------------------------------------------
# MCP Servers
# ---------------------------------------------------------------------------
mcp_servers:
  # --- Azure DevOps (stdio) ---
  ado_mcp:
    transport: stdio
    command: /home/coreyt/projects/ado-mcp/.venv/bin/ado-mcp
    args: ["--profile", "full"]
    env:
      ADO_ORG_URL: os.environ/ADO_ORG_URL
      ADO_PAT: os.environ/ADO_PAT

  # --- Armada GraphRAG (stdio) --- DISABLED: server hangs during MCP init
  # armada:
  #   transport: stdio
  #   command: /home/coreyt/projects/armada/cartographer/.venv/bin/armada-mcp
  #   args: []
  #   env:
  #     ARMADA_PROFILE: essential

  # --- Monospace Design TUI (stdio) ---
  mono_tui:
    transport: stdio
    command: python3
    args: ["/home/coreyt/projects/monospace-design-tui/mcp-server/server.py"]

  # --- NewsCatcher CatchAll (stdio) ---
  # Web search with NLP enrichment via CatchAll API (jobs-based, async).
  # Jobs take 2-10+ minutes. Best for batch research, not real-time.
  newscatcher:
    transport: stdio
    command: python3
    args: ["-m", "airlock.mcp_servers.newscatcher_server"]
    env:
      NEWS_CATCHER_API_KEY: os.environ/NEWS_CATCHER_API_KEY

# ---------------------------------------------------------------------------
# General proxy behaviour
# ---------------------------------------------------------------------------
general_settings:
  # Master key protects the /key/generate endpoint (set via env)
  master_key: os.environ/AIRLOCK_MASTER_KEY

  # Keep provider health checks lazy by default.
  # Airlock's own probes use /health/liveliness, so we do not need real
  # provider calls during startup just to determine whether the proxy is up.
  # Enable this only when you explicitly want periodic provider-wide checks.
  background_health_checks: false
  health_check_interval: 3600

  # Where the proxy listens
  # host: 0.0.0.0    # set via CLI flag or env
  # port: 4000       # set via CLI flag or env
