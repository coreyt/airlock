apiVersion: v1
kind: Secret
metadata:
  name: airlock-secrets
  labels:
    app: airlock
type: Opaque
# Values must be base64-encoded. Replace with your actual secrets.
# echo -n 'your-key' | base64
stringData:
  ANTHROPIC_API_KEY: "REPLACE_ME"
  OPENAI_API_KEY: "REPLACE_ME"
  AIRLOCK_MASTER_KEY: "REPLACE_ME"
